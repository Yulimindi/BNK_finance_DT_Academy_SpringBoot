<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>가입 페이지</h1>
	<hr>
	<a th:href="@{/admin_page}">관리자 메인 페이지로 가기</a>
	<br>
	<form th:action="@{/createMember}" method="post">
		부서<select name="dept">
			<option value="HR">인사팀</option>
			<option value="PL">기획팀</option>
			<option value="DE">개발팀</option>
		</select><br>
		이름<input type="text" name="name"><br>
		비밀번호<input type="text" name="pw"><br>
		직급<select name="position">
			<option value="ROLE_PRESIDENT">사장</option>
			<option value="ROLE_MANAGER">과장</option>
			<option value="ROLE_EMPLOYEE">사원</option>
			<option value="ROLE_ADMIN">관리자</option>
		</select><br>
		<input type="submit" value="가입">
	</form>
	
	<script th:inline="javascript">
		if([[${message}]] != null) {
			alert([[${message}]]);
		}
	</script>
</body>
</html>
