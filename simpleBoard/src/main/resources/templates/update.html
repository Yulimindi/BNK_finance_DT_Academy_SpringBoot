<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<form method="post" th:action="@{/update}" th:object="${post}">
		번호<input type="text" th:field="*{bno}" readonly>
		제목<input type="text" th:field="*{title}">
		내용<input type="text" th:field="*{content}">
		작성자<input type="text" th:field="*{writer}" readonly>
		<input type="submit" value="수정하기">
	</form>
</body>
</html>
