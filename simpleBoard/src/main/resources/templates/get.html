<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<table>
		<thead>
			<tr>
				<td>제목</td>
				<td>작성자</td>
			</tr>
		</thead>
		
		<tbody>
			<tr th:each="post : ${posts}">
				<td><a th:href="@{/getDetail(bno=${post.bno})}">[[${post.title}]]</a></td>
				<td><a th:href="@{/getDetail(bno=${post.bno})}">[[${post.writer}]]</a></td>
			</tr>
		</tbody>
	</table>
</body>
</html>
