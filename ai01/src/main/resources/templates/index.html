<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Chat Interface</title>
<style>
    /* 기본 레이아웃 설정 */
    body {
        font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        background-color: #f0f2f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        margin: 0;
        height: 100vh;
    }

    h1 { color: #1a73e8; margin-bottom: 10px; }

    /* 채팅 컨테이너 */
    #chat-container {
        width: 100%;
        max-width: 500px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* 입력 폼 영역 */
    #frm {
        display: flex;
        padding: 15px;
        background: #fff;
        border-bottom: 1px solid #eee;
    }

    input[name="message"] {
        flex: 1;
        padding: 10px 15px;
        border: 1px solid #ddd;
        border-radius: 20px;
        outline: none;
        transition: border 0.3s;
    }

    input[name="message"]:focus { border-color: #1a73e8; }

    button {
        margin-left: 10px;
        padding: 8px 18px;
        background-color: #1a73e8;
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover { background-color: #1557b0; }

    /* 상태 표시줄 */
    #state {
        font-size: 0.9rem;
        text-align: center;
        padding: 10px;
        margin: 0;
        background: #fafafa;
        color: #666;
        border-bottom: 1px solid #eee;
    }

    /* 채팅 기록 스크롤 영역 */
    #div {
        height: 400px;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background-color: #ffffff;
    }

    /* 채팅 줄바꿈 및 스타일링을 위한 팁: 
       기존 코드의 innerHTML 구조를 유지하면서 가독성을 높였습니다. */
    #div b { color: #1a73e8; }
</style>
</head>
<body>
    <h1>AI 채팅</h1>

    <div id="chat-container">
        <h2 id="state">질문 대기중</h2>
        
        <form id="frm">
            <input type="text" name="message" placeholder="메시지를 입력하세요...">
            <button type="button" onclick="question()">질문</button>
        </form>

        <div id="div"></div>
    </div>

    <script>
    const div = document.querySelector("#div");
    const state = document.querySelector("#state");
    
    function question() {
        state.innerHTML = "생각중...";
        const frm = document.querySelector("#frm");
        const formData = new FormData(frm);
        
        fetch("/ai/generate", {
            method : "POST",
            body : formData
        })
        .then(data => data.json())
        .then(data => {
            state.innerHTML = "질문 대기중";
            // 기존 기능을 유지하며 가독성을 위해 <b> 태그 정도만 추가했습니다.
            div.innerHTML += "<div><b>질문 :</b> " + data.que + "<br><b>응답 :</b> " + data.ans + "</div><hr style='border:0; border-top:1px solid #f0f0f0;'>";
            
            // 새 메시지가 오면 자동으로 스크롤을 맨 아래로 이동
            div.scrollTop = div.scrollHeight;
            
            // 입력창 초기화
            frm.reset();
        })
    }
    </script>
</body>
</html>
