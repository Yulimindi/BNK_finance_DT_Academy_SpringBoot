<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="board-header" style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 10px; align-items: center; background: white; padding: 10px 25px; border-radius: 50px; box-shadow: 0 5px 20px rgba(0,0,0,0.1);">
    <span style="font-weight: bold; color: var(--primary-forest);">Forest Board</span>
    <button id="add-btn" style="background: var(--primary-forest); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer;">+ 기억 심기</button>
    <button onclick="location.href='/logout'" style="background: none; border: 1px solid #ddd; padding: 5px 10px; border-radius: 20px; font-size: 0.7rem;">로그아웃</button>
</div>

<div id="board" style="width: 100vw; height: 100vh; position: relative;">
    
</div>

<div id="memo-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span>🌱 새 기억 심기</span>
            <button id="close-modal" class="close-btn">&times;</button>
        </div>
        <form class="modal-body" id="form">
            <input type="hidden" id="pos-x" name="posX">
            <input type="hidden" id="pos-y" name="posY">
            
            <input type="hidden" id="choose" name="choose" value="NO">

            <input type="text" id="memo-title" name="title" placeholder="기억 제목" required><br>

            <div class="lock-option-container">
                <label class="radio-label">
                    <input type="radio" name="s" value="NO" checked onclick="toggleLock(false)"> 
                    <span>🔓 공개하기</span>
                </label>
                <label class="radio-label">
                    <input type="radio" name="s" value="YES" onclick="toggleLock(true)"> 
                    <span>🔒 잠그기</span>
                </label>
            </div>

            <div id="user-search-area" class="search-section" style="display: none;">
                <div class="search-bar">
                    <input type="text" id="user-search-input" placeholder="닉네임 또는 아이디 입력">
                    <button type="button" id="user-search-btn" class="btn-small">검색</button>
                </div>
                <div id="search-results" class="search-results"></div>
                <div class="selected-users-label">📖 열람 가능한 사람:</div>
                <div id="selected-users-list" class="selected-list">
                    </div>
            </div>

            <textarea id="memo-text" name="content" placeholder="기억 내용" required></textarea>
            
            <div class="modal-footer">
                <button type="button" id="submit-memo" class="btn-forest">심기 완료</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">

//페이지 시작되면 실행
document.addEventListener("DOMContentLoaded", () => {
	loadAllMemos();
});

// 접근 가능한 이름 지우기
function deleteName(e) {
	console.log(e);
	e.closest('.user-tag').remove();
}

// 공개 / 잠그기 설정
function toggleLock(isLocked) {
    const searchArea = document.getElementById('user-search-area');
    const chooseInput = document.getElementById('choose');
    
    if (isLocked) {
        searchArea.style.display = 'block';
        chooseInput.value = 'YES'; // DB의 Secret.YES와 매핑
    } else {
        searchArea.style.display = 'none';
        chooseInput.value = 'NO';  // DB의 Secret.NO와 매핑
    }
}

// 유저 검색
document.getElementById('user-search-btn').addEventListener('click', () => {
	const search = document.querySelector("#user-search-input");
	const list = document.querySelector("#selected-users-list");
    fetch("/getUser?nickname=" + search.value)
    .then(data => data.json())
    .then(data => {
    	if(data.username != "null") {
    		list.innerHTML += `<div class="user-tag">${data.nickname}<button type="button" class="btn-del" onclick="deleteName(this)">x</button>
    							<input type="hidden" name="nameList" value="${data.username}">
    							</div>`;
    	}
    })
});



// 메모 삭제
function deleteMemo(mno) {
	fetch("/deleteMemo?mno=" + mno)
	.then(data => data.text())
	.then(data => {
		if(data == "true") {
			location.reload();
		}
	})
}

// 페이지 로드 시 전체 메모 불러오는 핵심 함수
function loadAllMemos() {
	const json = [[${memo}]];
	console.log("json 무슨 형태? " + json);
	for(i = 0; i < json.length; i++) {
		if(json[i].s == "YES") {
			console.log("YES");
			renderSecretMemo(json[i]);
		} else {
			console.log("NO");
			renderMemo(json[i]);
		}
	}
}

// 로그인 한 사람의 아이디 가져옴
const loginUser = [[${session.username}]];

let showMembers;

// 비밀 메모 가져오기
function renderSecretMemo(data) {
	console.log("무슨 형태?" + typeof data);
	console.log("NOOOO");
	
	const board = document.getElementById('board');
	const note = document.createElement('div');
	
	note.className = 'sticky-note';
	note.dataset.id = data.mno;
	
	note.style.left = data.posX + 'px';
	note.style.top = data.posY + 'px';
	note.style.backgroundColor = '#C8E6C9';

	note.innerHTML = `
	    <textarea readonly disabled style="width:100%; border:none; background:none; font-weight:bold; color:#2d5a27; resize:none; height:24px; padding:0;">${data.title}</textarea>
	    <hr style="border:0; border-top:1px solid #eee; margin:5px 0;">
	    ${loginUser == data.member.username ? 
	    		`<button class="delete-btn" id="${data.mno}" onclick="deleteMemo(${data.mno})" style="position:absolute; top:5px; right:5px; border:none; background:none; cursor:pointer;">✕</button>` : '' 
	    }
	    
	    <button class="showMemo-btn" id="${data.mno}" onclick="showMemo(this)">🔓</button>
	`;
	
	
	makeFrontable(note);
	board.appendChild(note);

}

// 비밀 메모 열기
function showMemo(e) {
	
	if(loginUser == "qwe") {
		console.log(e.id);
	} else {
		alert("쉿!🤫 비밀이에요!");
	}
}

// 전체 공개 메모 가져오기
function renderMemo(data) {
	console.log("NOOOO");
	const board = document.getElementById('board');
	const note = document.createElement('div');
	
	note.className = 'sticky-note';
	note.dataset.id = data.mno;
	
	note.style.left = data.posX + 'px';
	note.style.top = data.posY + 'px';
	note.style.backgroundColor = '#C8E6C9';
	
	note.innerHTML = `
	    <textarea readonly disabled style="width:100%; border:none; background:none; font-weight:bold; color:#2d5a27; resize:none; height:24px; padding:0;">${data.title}</textarea>
	    <hr style="border:0; border-top:1px solid #eee; margin:5px 0;">
	    <textarea readonly disabled style="width:100%; border:none; background:none; resize:none; min-height:60px; padding:0; line-height:1.4;">${data.content}</textarea>
	    ${loginUser == data.writer ? 
	        `<button class="delete-btn" id="${data.mno}" onclick="deleteMemo(${data.mno})" style="position:absolute; top:5px; right:5px; border:none; background:none; cursor:pointer;">✕</button>` : '' 
	    }
	`;
	
	makeFrontable(note);
	board.appendChild(note);
}

// 메모 만들기
let form = document.getElementById('form');
document.getElementById('submit-memo').addEventListener("click", () => {
	form = document.getElementById('form');
	const formData = new FormData(form);
	fetch("/createMemo", {
		method : "post",
		body : formData
	})
	.then(data => data.json())
	.then(data => {
		console.log("받아온 데이터 : " + data.writer);
		modal.style.display = 'none';
		renderMemo(data);
		form.reset();
	})
})

const modal = document.getElementById('memo-modal');
const addBtn = document.getElementById('add-btn');
const closeBtn = document.getElementById('close-modal');
const submitBtn = document.getElementById('submit-memo');
const board = document.getElementById('board');


// 클릭 대기
let isAddMode = false; // 현재 메모 심을 위치를 고르고 있나?
let pendingX = 0;
let pendingY = 0;

// 보드 클릭 시 모달 띄우기
addBtn.addEventListener('click', () => {
	isAddMode = true;
	board.style.cursor = 'crosshair'; // 마우스 커서 + 모양으로 변경
	alert("🌿 메모를 심을 위치를 보드 위에서 클릭해주세요!");
})

// 보드 클릭 시 (메모 위치 결정)
board.addEventListener('click', (e) => {
	// 심기 모드일 경우, 보드를 클릭했을 경우 (메모를 제외하고)
	if(isAddMode && e.target.id === 'board') {
		pendingX = e.clientX;
		pendingY = e.clientY;
		
		modal.style.display = 'flex'; // 모달 띄우기
		document.getElementById('memo-text').focus();
		
		document.getElementById('pos-x').value = pendingX;
		document.getElementById('pos-y').value = pendingY;
		
		isAddMode = false;
		board.style.cursor = 'default';
	}
})

closeBtn.addEventListener('click', () => {
	modal.style.display = 'none';
})

// --------------- 클릭한 메모지 가장 앞으로 오게 ----------------
// 현재 화면에서 가장 높은 z-index를 추적할 변수
let highestZIndex = 100; 

// 모든 메모지에게 클릭 이벤트를 부여하는 함수 (새 메모 생성 시에도 호출 필요)
function makeFrontable(noteElement) {
    noteElement.addEventListener('mousedown', function() {
        // 1. 모든 메모지의 z-index를 기본값(1)으로 초기화하고 active 클래스 제거
        document.querySelectorAll('.sticky-note').forEach(n => {
            n.style.zIndex = 1;
            n.classList.remove('active');
        });
        
        // 2. 현재 클릭한 메모지만 맨 앞으로 (숫자를 충분히 높게 설정)
        this.style.zIndex = 999;
        
        // 3. 현재 메모지에만 강조 스타일 추가
        this.classList.add('active');
    });
}

// 처음 페이지 로딩 시 기존 메모지들에 적용
document.querySelectorAll('.sticky-note').forEach(note => {
    makeFrontable(note);
});

</script>
</body>
</html>
